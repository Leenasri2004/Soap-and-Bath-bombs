<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="images/logo-1.png">
<title>Login – Lather & Bloom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/dark.css" />
</head>
<body class="page-login">
  <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">🌙</button>
  <button id="rtl-toggle" class="rtl-btn" aria-label="Toggle RTL">
    <span id="rtl-icon">LTR</span>
  </button>

  <div class="login-page">

    <!-- LEFT PANEL -->
    <div class="login-visual">
      <div class="visual-overlay"></div>
      <img src="images/handmade-soap-bars-2024-12-07-21-31-31-utc.webp" alt="Handmade Soaps" />
      <div class="visual-content">
        <a href="index.html" class="brand">Lather &amp; Bloom</a>
        <p class="tagline">"Pure ingredients.<br>Crafted with love."</p>
        <div class="visual-badges">
          <span><i class="fa-solid fa-leaf"></i> 100% Natural</span>
          <span><i class="fa-solid fa-hand-sparkles"></i> Handcrafted</span>
          <span><i class="fa-solid fa-heart"></i> Cruelty-Free</span>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="login-form-panel">
      <div class="form-box">

        <!-- Logo (mobile only) -->
        <a href="index.html" class="mobile-brand">Lather &amp; Bloom</a>

        <center><a href="index.html" class="footer-logo">
          <img src="images/logo-1.png" alt="Soap Studio Logo" class="logo-img">
        </a></center>

       

        <div class="divider"><span>or sign in with email</span></div>

        <!-- Login form -->
        <form id="loginForm" novalidate>

          <div class="field-group">
            <label for="email">Email address</label>
            <div class="input-wrap">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" id="email" placeholder="you@example.com" required />
            </div>
            <span class="error-msg" id="emailErr">Please enter a valid email.</span>
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="password" placeholder="••••••••" required />
              <button type="button" class="toggle-pw" aria-label="Toggle password">
                <i class="fa-regular fa-eye" id="eyeIcon"></i>
              </button>
            </div>
            <span class="error-msg" id="passErr">Password must be at least 6 characters.</span>
          </div>

          <div class="form-meta">
            <label class="remember">
              <input type="checkbox" id="remember" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot">Forgot password?</a>
          </div>
           <!-- Social login -->
        <div class="social-row">
          <button class="social-btn" type="button">
            <i class="fa-brands fa-google"></i> Continue with Google
          </button>
          <button class="social-btn" type="button">
            <i class="fa-brands fa-facebook-f"></i> Continue with Facebook
          </button>
          <button class="social-btn" type="button">
            <i class="fa-brands fa-apple"></i> Continue with Apple
          </button>
        </div>

          <button type="submit" class="btn-login">
            <span>Sign In</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>

        </form>

        <p class="signup-link">Don't have an account? <a href="register.html">Create one free</a></p>

      </div>

      
    </div>
    

  </div>

  <script>
    // Password toggle
    document.querySelector('.toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      const isHidden = pw.type === 'password';
      pw.type = isHidden ? 'text' : 'password';
      icon.className = isHidden ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
    });

    // Form validation
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('email');
      const pass  = document.getElementById('password');
      let valid = true;

      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim());
      document.getElementById('emailErr').classList.toggle('show', !emailOk);
      email.closest('.input-wrap').classList.toggle('error', !emailOk);
      if (!emailOk) valid = false;

      const passOk = pass.value.length >= 6;
      document.getElementById('passErr').classList.toggle('show', !passOk);
      pass.closest('.input-wrap').classList.toggle('error', !passOk);
      if (!passOk) valid = false;

      if (valid) window.location.href = 'index.html';
    });
  </script>

  <script src="js/theme.js"></script>
</body>
</html>
